<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; margin-bottom: 16px; font-size: 1.1rem; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 0.95rem; }
        input:focus { outline: none; border-color: #3498db; }
        button { width: 100%; padding: 11px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .message { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; }
        .success { background: #d5f5e3; color: #1e8449; }
        .error { background: #fadbd8; color: #922b21; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; }
        .expense-info h3 { font-size: 0.95rem; color: #2c3e50; }
        .expense-info p { font-size: 0.85rem; color: #7f8c8d; margin-top: 2px; }
        .expense-amount { font-weight: bold; color: #2c3e50; font-size: 1rem; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-left: 12px; }
        .delete-btn:hover { background: #c0392b; }
        .hidden { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .tab.active { background: #3498db; color: white; border-color: #3498db; }
        .logout-btn { float: right; background: none; border: 1px solid #ddd; color: #666; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; width: auto; }
        .logout-btn:hover { background: #f5f5f5; }
        .total { text-align: right; color: #7f8c8d; font-size: 0.9rem; margin-bottom: 12px; }
        .total span { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 Expense Tracker</h1>
    <p class="subtitle">Track your expenses simply and securely</p>

    <!-- Auth Section -->
    <div id="authSection">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div class="card" id="loginForm">
            <h2>Login</h2>
            <div id="loginMessage"></div>
            <input type="email" id="loginEmail" placeholder="Email address" />
            <input type="password" id="loginPassword" placeholder="Password" />
            <button onclick="login()">Login</button>
        </div>

        <div class="card hidden" id="registerForm">
            <h2>Create Account</h2>
            <div id="registerMessage"></div>
            <input type="email" id="registerEmail" placeholder="Email address" />
            <input type="password" id="registerPassword" placeholder="Password (min 6 chars, 1 uppercase, 1 number)" />
            <button onclick="register()">Create Account</button>
        </div>
    </div>

    <!-- App Section -->
    <div id="appSection" class="hidden">
        <div class="card">
            <button class="logout-btn" onclick="logout()">Logout</button>
            <h2>Add New Expense</h2>
            <div id="addMessage"></div>
            <input type="text" id="expTitle" placeholder="Title (e.g. Grocery shopping)" />
            <input type="number" id="expAmount" placeholder="Amount" step="0.01" />
            <input type="text" id="expCategory" placeholder="Category (e.g. Food, Transport)" />
            <input type="date" id="expDate" />
            <button onclick="addExpense()">Add Expense</button>
        </div>

        <div class="card">
            <h2>Your Expenses</h2>
            <div id="totalDisplay" class="total"></div>
            <div id="expensesList"></div>
        </div>
    </div>
</div>

<script>
    const API = '';
    let token = localStorage.getItem('token') || '';

    if (token) showApp();

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        }
    }

    function showMessage(elementId, message, isError) {
        const el = document.getElementById(elementId);
        el.className = 'message ' + (isError ? 'error' : 'success');
        el.textContent = message;
    }

    async function register() {
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;
        if (!email || !password) return showMessage('registerMessage', 'Please fill in all fields', true);

        const res = await fetch(`${API}/api/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (res.ok) {
            showMessage('registerMessage', 'Account created! Please login.', false);
            setTimeout(() => switchTab('login'), 1500);
        } else {
            const data = await res.json();
            showMessage('registerMessage', data[0]?.description || 'Registration failed', true);
        }
    }

    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) return showMessage('loginMessage', 'Please fill in all fields', true);

        const res = await fetch(`${API}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (res.ok) {
            const data = await res.json();
            token = data.token;
            localStorage.setItem('token', token);
            showApp();
        } else {
            showMessage('loginMessage', 'Invalid email or password', true);
        }
    }

    function logout() {
        token = '';
        localStorage.removeItem('token');
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('appSection').classList.add('hidden');
    }

    function showApp() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('expDate').valueAsDate = new Date();
        loadExpenses();
    }

    async function loadExpenses() {
        const res = await fetch(`${API}/api/expenses`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) return logout();

        const data = await res.json();
        const expenses = data.data || [];
        const list = document.getElementById('expensesList');

        if (expenses.length === 0) {
            list.innerHTML = '<p style="color:#7f8c8d;text-align:center;padding:20px">No expenses yet. Add your first one!</p>';
            document.getElementById('totalDisplay').innerHTML = '';
            return;
        }

        const total = expenses.reduce((sum, e) => sum + e.amount, 0);
        document.getElementById('totalDisplay').innerHTML = `Total: <span>$${total.toFixed(2)}</span>`;

        list.innerHTML = expenses.map(e => `
            <div class="expense-item">
                <div class="expense-info">
                    <h3>${e.title}</h3>
                    <p>${e.category} · ${new Date(e.date).toLocaleDateString()}</p>
                </div>
                <div style="display:flex;align-items:center">
                    <span class="expense-amount">$${e.amount.toFixed(2)}</span>
                    <button class="delete-btn" onclick="deleteExpense(${e.id})">Delete</button>
                </div>
            </div>
        `).join('');
    }

    async function addExpense() {
        const title = document.getElementById('expTitle').value;
        const amount = parseFloat(document.getElementById('expAmount').value);
        const category = document.getElementById('expCategory').value;
        const date = document.getElementById('expDate').value;

        if (!title || !amount || !category || !date)
            return showMessage('addMessage', 'Please fill in all fields', true);

        const res = await fetch(`${API}/api/expenses`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ title, amount, category, date })
        });

        if (res.ok) {
            showMessage('addMessage', 'Expense added successfully!', false);
            document.getElementById('expTitle').value = '';
            document.getElementById('expAmount').value = '';
            document.getElementById('expCategory').value = '';
            loadExpenses();
        } else {
            const data = await res.json();
            showMessage('addMessage', data.errors?.[0] || 'Failed to add expense', true);
        }
    }

    async function deleteExpense(id) {
        if (!confirm('Delete this expense?')) return;

        const res = await fetch(`${API}/api/expenses/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) loadExpenses();
    }
</script>
</body>
</html>
